<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mobina ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bgMusic" preload="auto" loop>
        <source src="music.mp3" type="audio/mpeg">
        مرورگر شما از پخش صدا پشتیبانی نمی‌کند.
    </audio>

    <!-- دکمه کنترل موزیک -->
    <div class="music-control" id="musicBtn">🔊</div>

    <!-- افکت‌ها -->
    <div class="background"></div>
    <div class="stars"></div>
    <div id="hearts"></div>

    <!-- صحنه اول -->
    <section class="scene active" id="scene1">

        <h3 class="top-text">
            برای خاص‌ترین دختر دنیا
        </h3>

        <h1 class="title">
            Mobina ❤️
        </h1>

        <p class="subtitle">
            این فقط یک سایت نیست...
            <br>
            این تمام احساس قلب منه...
        </p>

        <button id="startBtn">
            ✨ شروع سفر ✨
        </button>

    </section>

    <!-- صحنه دوم -->
    <section class="scene" id="scene2">

        <h1 class="big-text">
            ✨ اولین نگاه ✨
        </h1>

        <p class="story"></p>

    </section>

    <!-- صحنه سوم -->
    <section class="scene" id="scene3">

        <h1 class="big-text">
            ❤️ حقیقت ❤️
        </h1>

        <p class="story"></p>

    </section>

    <!-- صحنه چهارم -->
    <section class="scene" id="scene4">

        <h1 class="big-text">
            🌌 پایان نیست...
        </h1>

        <p class="story"></p>

    </section>

    <script src="script.js"></script>

</body>

</html>
